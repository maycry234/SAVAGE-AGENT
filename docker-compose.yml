version: '3.8'

# One-shot CLI usage (does not start the long-running agent):
#   docker compose run --rm savage-agent python -m agent.cli health
#   docker compose run --rm savage-agent python -m agent.cli positions
#   docker compose run --rm savage-agent python -m agent.cli paper-balance
#   docker compose run --rm savage-agent python -m agent.cli generate-key

services:
  savage-agent:
    build: .
    container_name: savage-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    healthcheck:
      test: ["CMD", "python", "-m", "agent.cli", "health"]
      interval: 60s
      timeout: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
